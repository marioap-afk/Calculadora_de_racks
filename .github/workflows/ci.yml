# CI mínimo de RackCad (auditoría 2026-07-16).
# Los jobs estables dejan fuera al Plugin: sus referencias requieren AutoCAD instalado. I-13 agrega
# abajo una prueba experimental aislada y limitada a su rama. La suite corre en ubuntu
# (Domain/Application son net8.0 puro); la UI compila en windows (WPF), lo que valida
# transitivamente Domain y Application contra cambios de API.
name: CI

# Corre en TODO push (sin lista de ramas: una copia de los prefijos de WORKFLOW §1 aquí divergiría,
# y el checklist de cierre exige "CI verde en la rama" para cualquier iniciativa). Sin trigger
# pull_request para no duplicar corridas; la compuerta de integración es el CI del push (WORKFLOW §4.5).
on:
  push:

jobs:
  tests:
    name: Tests (Domain + Application)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: dotnet test with Cobertura
        run: dotnet test tests/RackCad.Tests/RackCad.Tests.csproj -c Debug -v:minimal --collect:"XPlat Code Coverage" --results-directory artifacts/TestResults -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
      - name: Normalize coverage path
        shell: pwsh
        run: |
          $coverageFiles = @(Get-ChildItem -LiteralPath artifacts/TestResults -Recurse -File -Filter coverage.cobertura.xml)
          if ($coverageFiles.Count -ne 1) {
            throw "Expected exactly one coverage.cobertura.xml, found $($coverageFiles.Count)."
          }

          $destination = "artifacts/coverage/coverage.cobertura.xml"
          New-Item -ItemType Directory -Path (Split-Path -Parent $destination) -Force | Out-Null
          Copy-Item -LiteralPath $coverageFiles[0].FullName -Destination $destination
      - name: Upload Cobertura coverage
        uses: actions/upload-artifact@v4
        with:
          name: rackcad-coverage-cobertura
          path: artifacts/coverage/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 14

  build-ui:
    name: Build UI (WPF, valida API de Application)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: dotnet build UI
        run: dotnet build src/RackCad.UI/RackCad.UI.csproj -c Debug -v:minimal

  plugin-autocad-references-experiment:
    name: Experimental Plugin build (AutoCAD compile references)
    if: github.ref == 'refs/heads/experiment/refs-autocad-ci'
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Identify clean runner and isolate NuGet
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $knownPaths = @(
            "C:\Program Files\Autodesk\AutoCAD 2025",
            "C:\Program Files\Autodesk\AutoCAD 2025\acad.exe"
          )
          $knownRegistryKeys = @(
            "HKLM:\SOFTWARE\Autodesk\AutoCAD\R25.0",
            "HKLM:\SOFTWARE\WOW6432Node\Autodesk\AutoCAD\R25.0"
          )
          $autoCADSignals = @(
            $knownPaths | Where-Object { Test-Path -LiteralPath $_ }
            $knownRegistryKeys | Where-Object { Test-Path -LiteralPath $_ }
            Get-Command acad.exe -ErrorAction SilentlyContinue | ForEach-Object { $_.Source }
          )
          if ($autoCADSignals.Count -ne 0) {
            $autoCADSignals | ForEach-Object { Write-Host "Unexpected AutoCAD signal: $_" }
            throw "E2 requires a runner without AutoCAD."
          }

          $root = Join-Path $env:RUNNER_TEMP "rackcad-i13-e2"
          $packages = Join-Path $root "nuget-packages"
          $httpCache = Join-Path $root "nuget-http-cache"
          $scratch = Join-Path $root "nuget-scratch"
          $cliHome = Join-Path $root "dotnet-home"
          $emptyAutoCAD = Join-Path $root "NO-AUTOCAD-INSTALLED"
          $testResults = Join-Path $root "test-results"
          $nugetConfig = Join-Path $root "NuGet.Config"
          $lockFile = Join-Path $root "packages.lock.json"

          New-Item -ItemType Directory -Force -Path $root, $packages, $httpCache, $scratch, $cliHome, $emptyAutoCAD, $testResults | Out-Null
          if (@(Get-ChildItem -LiteralPath $packages -Force).Count -ne 0) {
            throw "The isolated NuGet cache was not empty at E2 start."
          }
          foreach ($assembly in "AcCoreMgd.dll", "AcDbMgd.dll", "AcMgd.dll") {
            if (Test-Path -LiteralPath (Join-Path $emptyAutoCAD $assembly)) {
              throw "The empty AutoCAD directory contains $assembly."
            }
          }

          @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            </packageSources>
          </configuration>
          "@ | Set-Content -LiteralPath $nugetConfig -Encoding utf8

          "E2_ROOT=$root" >> $env:GITHUB_ENV
          "E2_EMPTY_AUTOCAD_DIR=$emptyAutoCAD" >> $env:GITHUB_ENV
          "E2_NUGET_CONFIG=$nugetConfig" >> $env:GITHUB_ENV
          "E2_LOCK_FILE=$lockFile" >> $env:GITHUB_ENV
          "E2_TEST_RESULTS=$testResults" >> $env:GITHUB_ENV
          "NUGET_PACKAGES=$packages" >> $env:GITHUB_ENV
          "NUGET_HTTP_CACHE_PATH=$httpCache" >> $env:GITHUB_ENV
          "NUGET_SCRATCH=$scratch" >> $env:GITHUB_ENV
          "DOTNET_CLI_HOME=$cliHome" >> $env:GITHUB_ENV
          "DOTNET_CLI_TELEMETRY_OPTOUT=1" >> $env:GITHUB_ENV
          "DOTNET_NOLOGO=1" >> $env:GITHUB_ENV
          "DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1" >> $env:GITHUB_ENV

          $os = Get-CimInstance Win32_OperatingSystem
          Write-Host "Commit: $env:GITHUB_SHA"
          Write-Host "Runner image: $env:ImageOS $env:ImageVersion"
          Write-Host "Windows: $($os.Caption) $($os.Version) build $($os.BuildNumber)"
          Write-Host "Architecture: $env:PROCESSOR_ARCHITECTURE"
          Write-Host "NuGet source: https://api.nuget.org/v3/index.json"
          Write-Host "AutoCAD signals: none"
          dotnet --info

      - name: Negative control without AutoCAD references
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $project = "src/RackCad.Plugin/RackCad.Plugin.csproj"
          $commonProperties = @(
            "-p:UseAutoCADNuGetReferences=false",
            "-p:AutoCADInstallDir=$env:E2_EMPTY_AUTOCAD_DIR",
            "-p:RestorePackagesPath=$env:NUGET_PACKAGES"
          )

          & dotnet restore $project --configfile $env:E2_NUGET_CONFIG --no-cache --force @commonProperties -p:Configuration=Release -v:minimal
          if ($LASTEXITCODE -ne 0) {
            throw "Negative-control restore failed before the causal compile check."
          }

          $negativeOutput = @(& dotnet build $project -c Release --no-restore @commonProperties -v:minimal 2>&1)
          $negativeExitCode = $LASTEXITCODE
          $negativeOutput | ForEach-Object { Write-Host $_ }
          $negativeText = $negativeOutput -join [Environment]::NewLine

          if ($negativeExitCode -eq 0) {
            throw "Negative control compiled unexpectedly without AutoCAD references."
          }
          if ($negativeText -match "(?im)\berror\s+(MSB|NU|NETSDK)\d+\b") {
            throw "Negative control failed for MSBuild, NuGet, or SDK infrastructure rather than missing Autodesk references."
          }
          if ($negativeText -notmatch "(?im)\berror\s+CS0(234|246)\b.*\bAutodesk\b") {
            throw "Negative control did not contain the expected missing Autodesk namespace/type cause."
          }
          if (@(Get-ChildItem -LiteralPath $env:NUGET_PACKAGES -Recurse -File -Force).Count -ne 0) {
            throw "Negative control populated the isolated package cache before the positive restore."
          }

          Write-Host "Negative control passed: Plugin cannot compile without Autodesk references."
          exit 0

      - name: Restore locked graph and verify packages
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $project = "src/RackCad.Plugin/RackCad.Plugin.csproj"
          $positiveProperties = @(
            "-p:UseAutoCADNuGetReferences=true",
            "-p:AutoCADInstallDir=$env:E2_EMPTY_AUTOCAD_DIR",
            "-p:RestorePackagesPath=$env:NUGET_PACKAGES"
          )
          $expected = [ordered]@{
            "AutoCAD.NET" = @{
              Version = "25.0.1"
              Sha256 = "b629f09e10bb7f414460e1ad47e4efa6d24d2815d00def388a64b10570ccd4c1"
              Compile = "lib/net8.0/AcMgd.dll"
            }
            "AutoCAD.NET.Core" = @{
              Version = "25.0.0"
              Sha256 = "167a3b003d30230197cc150911080815bd5299e8e28fa411c64498e8e830ea53"
              Compile = "lib/net8.0/AcCoreMgd.dll"
            }
            "AutoCAD.NET.Model" = @{
              Version = "25.0.0"
              Sha256 = "06779a73f5da2eed6a98c063ea13cde4eb07056b088772fca91c93ecdc770283"
              Compile = "lib/net8.0/AcDbMgd.dll"
            }
          }

          if (@(Get-ChildItem -LiteralPath $env:NUGET_PACKAGES -Recurse -File -Force).Count -ne 0) {
            throw "The positive restore did not start from an empty package cache."
          }

          & dotnet restore $project --configfile $env:E2_NUGET_CONFIG --no-cache --force --use-lock-file --lock-file-path $env:E2_LOCK_FILE @positiveProperties -p:Configuration=Release -v:minimal
          if ($LASTEXITCODE -ne 0) {
            throw "Initial positive restore failed."
          }
          if (-not (Test-Path -LiteralPath $env:E2_LOCK_FILE -PathType Leaf)) {
            throw "The temporary lock file was not generated."
          }

          $lock = Get-Content -LiteralPath $env:E2_LOCK_FILE -Raw | ConvertFrom-Json
          $frameworks = @($lock.dependencies.PSObject.Properties)
          if ($frameworks.Count -ne 1) {
            throw "Expected one locked target framework, found $($frameworks.Count)."
          }
          $frameworkEntries = @($frameworks[0].Value.PSObject.Properties)
          $allowedEntryTypes = @("Direct", "Transitive", "Project")
          $unknownTypeEntries = @(
            $frameworkEntries |
              Where-Object { [string]$_.Value.type -notin $allowedEntryTypes }
          )
          if ($unknownTypeEntries.Count -ne 0) {
            $unknownTypes = @($unknownTypeEntries | ForEach-Object { "$($_.Name)=$($_.Value.type)" })
            throw "Temporary lock contains an entry with an unexpected type: $($unknownTypes -join ', ')."
          }

          $packageEntries = @($frameworkEntries | Where-Object { [string]$_.Value.type -ne "Project" })
          $projectEntries = @($frameworkEntries | Where-Object { [string]$_.Value.type -eq "Project" })
          $lockedPackageNames = @($packageEntries.Name | Sort-Object)
          $lockedProjectNames = @($projectEntries.Name | Sort-Object)
          $expectedPackageNames = @($expected.Keys | Sort-Object)
          $expectedProjectNames = @(
            @("rackcad.application", "rackcad.domain", "rackcad.ui") | Sort-Object
          )
          if (@(Compare-Object $expectedPackageNames $lockedPackageNames -CaseSensitive:$false).Count -ne 0) {
            throw "Temporary lock contains a missing or unexpected NuGet package: $($lockedPackageNames -join ', ')."
          }
          if (@(Compare-Object $expectedProjectNames $lockedProjectNames -CaseSensitive:$false).Count -ne 0) {
            throw "Temporary lock contains a missing or unexpected project reference: $($lockedProjectNames -join ', ')."
          }

          $lockByName = @{}
          foreach ($frameworkEntry in $frameworkEntries) {
            $lockByName[$frameworkEntry.Name] = $frameworkEntry.Value
          }
          $expectedPackageTypes = @{
            "AutoCAD.NET" = "Direct"
            "AutoCAD.NET.Core" = "Transitive"
            "AutoCAD.NET.Model" = "Transitive"
          }
          foreach ($packageName in $expected.Keys) {
            $entry = $lockByName[$packageName]
            if ($null -eq $entry) {
              throw "Missing lock entry for $packageName."
            }
            if ([string]$entry.type -ne $expectedPackageTypes[$packageName]) {
              throw "Unexpected lock type for ${packageName}: $($entry.type)."
            }
            if ([string]$entry.resolved -ne $expected[$packageName].Version) {
              throw "Unexpected resolved version for ${packageName}: $($entry.resolved)."
            }
            if ([string]::IsNullOrWhiteSpace([string]$entry.contentHash)) {
              throw "Missing content hash for $packageName."
            }
          }
          foreach ($projectName in $expectedProjectNames) {
            if ([string]$lockByName[$projectName].type -ne "Project") {
              throw "Unexpected lock type for project reference ${projectName}: $($lockByName[$projectName].type)."
            }
          }

          # resolved is the stable version gate; requested is informative and may vary only in whitespace or bare/range form.
          $requestedAutoCAD = [string]$lockByName["AutoCAD.NET"].requested -replace "\s", ""
          if (-not [string]::IsNullOrWhiteSpace($requestedAutoCAD) -and
              $requestedAutoCAD -notin @("[25.0.1,)", "25.0.1")) {
            throw "Unexpected requested version for AutoCAD.NET: $($lockByName['AutoCAD.NET'].requested)."
          }
          $autoCADDependency = [string]$lockByName["AutoCAD.NET"].dependencies."AutoCAD.NET.Core"
          $coreDependency = [string]$lockByName["AutoCAD.NET.Core"].dependencies."AutoCAD.NET.Model"
          $normalizedAutoCADDependency = $autoCADDependency -replace "\s", ""
          $normalizedCoreDependency = $coreDependency -replace "\s", ""
          if ($normalizedAutoCADDependency -notin @("[25.0.0]", "25.0.0") -or
              $normalizedCoreDependency -notin @("[25.0.0]", "25.0.0")) {
            throw "The temporary lock does not preserve the expected exact transitive versions."
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $licenseSha256 = "df90a4dd078e9674a5f2b7be32664c85ec4bc516a415cfc06080e8cb69df1709"
          foreach ($packageId in $expected.Keys) {
            $package = $expected[$packageId]
            $packageDirectory = Join-Path $env:NUGET_PACKAGES "$($packageId.ToLowerInvariant())\$($package.Version)"
            $nupkgs = @(Get-ChildItem -LiteralPath $packageDirectory -File -Filter "*.nupkg")
            $shaSidecars = @(Get-ChildItem -LiteralPath $packageDirectory -File -Filter "*.nupkg.sha512")
            $metadataFiles = @(Get-ChildItem -LiteralPath $packageDirectory -File -Filter ".nupkg.metadata")
            if ($nupkgs.Count -ne 1 -or $shaSidecars.Count -ne 1 -or $metadataFiles.Count -ne 1) {
              throw "Expected one nupkg, one SHA-512 sidecar, and one metadata file for $packageId $($package.Version)."
            }

            $actualSha256 = (Get-FileHash -LiteralPath $nupkgs[0].FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualSha256 -ne $package.Sha256) {
              throw "SHA-256 mismatch for $packageId $($package.Version)."
            }
            $actualSha512 = [Convert]::ToBase64String([Security.Cryptography.SHA512]::HashData([IO.File]::ReadAllBytes($nupkgs[0].FullName)))
            $sidecarSha512 = (Get-Content -LiteralPath $shaSidecars[0].FullName -Raw).Trim()
            if ($actualSha512 -ne $sidecarSha512) {
              throw "SHA-512 mismatch between package and sidecar for $packageId."
            }
            $packageMetadata = Get-Content -LiteralPath $metadataFiles[0].FullName -Raw | ConvertFrom-Json
            if ([string]$packageMetadata.contentHash -ne [string]$lockByName[$packageId].contentHash) {
              throw "NuGet content hash mismatch between metadata and lock for $packageId."
            }
            if ([string]$packageMetadata.source -ne "https://api.nuget.org/v3/index.json") {
              throw "Unexpected package metadata source for $packageId."
            }

            $archive = [IO.Compression.ZipFile]::OpenRead($nupkgs[0].FullName)
            try {
              $entryNames = @($archive.Entries.FullName)
              $nuspecEntries = @($archive.Entries | Where-Object { $_.FullName -like "*.nuspec" })
              if ($nuspecEntries.Count -ne 1 -or "LICENSE.txt" -notin $entryNames) {
                throw "Expected nuspec or LICENSE.txt is missing from $packageId."
              }
              if (@($entryNames | Where-Object { $_ -match "(?i)^(ref|runtimes|build|buildTransitive)/|\.(props|targets|exe|arx|dbx)$" }).Count -ne 0) {
                throw "Unexpected reference/runtime/build/native content appeared in $packageId."
              }

              $reader = [IO.StreamReader]::new($nuspecEntries[0].Open())
              try { [xml]$nuspec = $reader.ReadToEnd() } finally { $reader.Dispose() }
              $owners = $nuspec.SelectSingleNode("//*[local-name()='metadata']/*[local-name()='owners']").InnerText
              $authors = $nuspec.SelectSingleNode("//*[local-name()='metadata']/*[local-name()='authors']").InnerText
              if ($owners -ne "Autodesk, Inc." -or $authors -ne "AutoCAD Team") {
                throw "Package metadata changed for $packageId (owners/authors)."
              }

              $licenseEntry = $archive.GetEntry("LICENSE.txt")
              $licenseStream = $licenseEntry.Open()
              $sha = [Security.Cryptography.SHA256]::Create()
              try {
                $actualLicenseHash = [Convert]::ToHexString($sha.ComputeHash($licenseStream)).ToLowerInvariant()
              } finally {
                $sha.Dispose()
                $licenseStream.Dispose()
              }
              if ($actualLicenseHash -ne $licenseSha256) {
                throw "LICENSE.txt changed for $packageId."
              }
            } finally {
              $archive.Dispose()
            }

            Write-Host "$packageId $($package.Version): SHA-256/SHA-512, metadata, license, and package layout verified."
          }

          & dotnet restore $project --configfile $env:E2_NUGET_CONFIG --no-cache --locked-mode --lock-file-path $env:E2_LOCK_FILE @positiveProperties -p:RestoreRecursive=false -p:Configuration=Release -v:minimal
          if ($LASTEXITCODE -ne 0) {
            throw "Locked positive restore failed."
          }

          $assetsPath = "src/RackCad.Plugin/obj/project.assets.json"
          $assets = Get-Content -LiteralPath $assetsPath -Raw | ConvertFrom-Json
          $sources = @($assets.project.restore.sources.PSObject.Properties.Name)

          $script:E2EffectiveDotnetRoot = $null

          function ConvertTo-SanitizedPath {
            param([AllowEmptyString()][string]$Value)

            if ([string]::IsNullOrWhiteSpace($Value)) {
              return "<empty>"
            }

            $result = $Value
            $replacementRoots = [ordered]@{}
            if (-not [string]::IsNullOrWhiteSpace($env:RUNNER_TEMP)) {
              $replacementRoots[$env:RUNNER_TEMP] = "<RUNNER_TEMP>"
            }
            if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_WORKSPACE)) {
              $replacementRoots[$env:GITHUB_WORKSPACE] = "<GITHUB_WORKSPACE>"
            }
            if (-not [string]::IsNullOrWhiteSpace($env:DOTNET_ROOT)) {
              $replacementRoots[$env:DOTNET_ROOT] = "<DOTNET_ROOT>"
            }
            if (-not [string]::IsNullOrWhiteSpace($script:E2EffectiveDotnetRoot)) {
              $replacementRoots[$script:E2EffectiveDotnetRoot] = "<DOTNET_ROOT>"
            }

            foreach ($replacement in $replacementRoots.GetEnumerator()) {
              foreach ($candidate in @($replacement.Key, $replacement.Key.Replace('\', '/'))) {
                if (-not [string]::IsNullOrWhiteSpace($candidate)) {
                  $result = $result.Replace(
                    $candidate,
                    $replacement.Value,
                    [System.StringComparison]::OrdinalIgnoreCase)
                }
              }
            }
            return $result
          }

          function ConvertTo-SanitizedUri {
            param([AllowEmptyString()][string]$Value)

            if ([string]::IsNullOrWhiteSpace($Value)) {
              return "<empty>"
            }
            if ([IO.Path]::IsPathRooted($Value)) {
              return ConvertTo-SanitizedPath $Value
            }

            $uri = $null
            if (-not [Uri]::TryCreate($Value, [UriKind]::Absolute, [ref]$uri)) {
              return ConvertTo-SanitizedPath $Value
            }

            $builder = [UriBuilder]::new($uri)
            $builder.UserName = ""
            $builder.Password = ""
            $builder.Query = ""
            return ConvertTo-SanitizedPath $builder.Uri.AbsoluteUri
          }

          function ConvertTo-SanitizedSourceList {
            param([AllowEmptyString()][string]$Value)

            $items = @($Value -split ';' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
            if ($items.Count -eq 0) {
              return @("<empty>")
            }
            return @($items | ForEach-Object { ConvertTo-SanitizedUri $_.Trim() })
          }

          function ConvertTo-SanitizedPathList {
            param([AllowEmptyString()][string]$Value)

            $items = @($Value -split ';' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
            if ($items.Count -eq 0) {
              return @("<empty>")
            }
            return @($items | ForEach-Object { ConvertTo-SanitizedPath $_.Trim() })
          }

          function ConvertTo-SanitizedText {
            param([AllowEmptyString()][string]$Value)

            if ([string]::IsNullOrWhiteSpace($Value)) {
              return "<empty>"
            }
            if ($Value -match "(?i)\b(password|token|secret|credential|api[-_]?key)\b\s*[:=]") {
              return "<redacted>"
            }

            $result = ConvertTo-SanitizedPath $Value
            $matches = @([regex]::Matches($result, "https?://\S+"))
            for ($index = $matches.Count - 1; $index -ge 0; $index--) {
              $match = $matches[$index]
              $safeUri = ConvertTo-SanitizedUri $match.Value
              $result = $result.Remove($match.Index, $match.Length).Insert($match.Index, $safeUri)
            }
            return $result
          }

          function Write-SanitizedList {
            param(
              [string]$Label,
              [object[]]$Values,
              [ValidateSet("Path", "Source", "Text")][string]$Kind
            )

            Write-Host ($Label + ":")
            $items = @($Values | Where-Object { $null -ne $_ })
            if ($items.Count -eq 0) {
              Write-Host "- <none>"
              return
            }
            foreach ($item in $items) {
              $safeValue = switch ($Kind) {
                "Path" { ConvertTo-SanitizedPath ([string]$item) }
                "Source" { ConvertTo-SanitizedUri ([string]$item) }
                default { ConvertTo-SanitizedText ([string]$item) }
              }
              Write-Host "- $safeValue"
            }
          }

          # E2 source policy helpers: begin
          function Get-E2CanonicalNativePath {
            param([string]$Value)

            if ([string]::IsNullOrWhiteSpace($Value) -or -not [IO.Path]::IsPathRooted($Value)) {
              throw "Expected an absolute native path."
            }
            return [IO.Path]::GetFullPath($Value).TrimEnd([char[]]@('\', '/'))
          }

          function Get-E2CanonicalHttpsSource {
            param([string]$Value)

            $uri = $null
            if (-not [Uri]::TryCreate($Value, [UriKind]::Absolute, [ref]$uri) -or
                $uri.Scheme -ne [Uri]::UriSchemeHttps) {
              return $null
            }
            return $uri.AbsoluteUri.TrimEnd('/')
          }

          function Split-E2PropertyList {
            param([AllowEmptyString()][string]$Value)

            return @($Value -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          }

          function Test-E2SamePath {
            param([string]$Left, [string]$Right)

            return [string]::Equals(
              (Get-E2CanonicalNativePath $Left),
              (Get-E2CanonicalNativePath $Right),
              [StringComparison]::OrdinalIgnoreCase)
          }

          function Test-E2PathWithin {
            param([string]$Candidate, [string]$Root)

            $canonicalCandidate = Get-E2CanonicalNativePath $Candidate
            $canonicalRoot = Get-E2CanonicalNativePath $Root
            $rootPrefix = $canonicalRoot + [IO.Path]::DirectorySeparatorChar
            return $canonicalCandidate.StartsWith($rootPrefix, [StringComparison]::OrdinalIgnoreCase)
          }

          function Assert-E2SourcePolicy {
            param(
              [string[]]$EffectiveSources,
              [AllowEmptyString()][string]$RestoreSources,
              [AllowEmptyString()][string]$RestoreAdditionalProjectSources,
              [string[]]$AssetFallbackFolders,
              [AllowEmptyString()][string]$RestoreFallbackFolders,
              [AllowEmptyString()][string]$RestoreAdditionalProjectFallbackFolders,
              [string]$ExpectedLibraryPacks
            )

            $expectedNuGetSource = [Uri]"https://api.nuget.org/v3/index.json"
            $expectedNuGetCanonical = $expectedNuGetSource.AbsoluteUri.TrimEnd('/')
            $expectedLibraryPacksCanonical = Get-E2CanonicalNativePath $ExpectedLibraryPacks
            $httpsSources = @()
            $localSources = @()
            $invalidSources = @()
            $canonicalKeys = @()

            foreach ($source in @($EffectiveSources)) {
              if ([IO.Path]::IsPathRooted($source)) {
                $canonical = Get-E2CanonicalNativePath $source
                $localSources += $canonical
                $canonicalKeys += "path:$($canonical.ToLowerInvariant())"
                continue
              }

              $canonical = Get-E2CanonicalHttpsSource $source
              if ($null -ne $canonical) {
                $httpsSources += $canonical
                $canonicalKeys += "https:$($canonical.ToLowerInvariant())"
              } else {
                $invalidSources += $source
              }
            }

            $additionalSources = @(Split-E2PropertyList $RestoreAdditionalProjectSources)
            $libraryPacksDeclared = $additionalSources.Count -eq 1 -and
              [IO.Path]::IsPathRooted($additionalSources[0]) -and
              (Test-E2SamePath $additionalSources[0] $expectedLibraryPacksCanonical)
            $restoreSourceItems = @(Split-E2PropertyList $RestoreSources)
            $restoreSourcesCoherent = $restoreSourceItems.Count -eq 0 -or
              ($restoreSourceItems.Count -eq 1 -and
               [string]::Equals(
                 (Get-E2CanonicalHttpsSource $restoreSourceItems[0]),
                 $expectedNuGetCanonical,
                 [StringComparison]::OrdinalIgnoreCase))
            $fallbacksEmpty = @($AssetFallbackFolders | Where-Object { $_ }).Count -eq 0 -and
              (Split-E2PropertyList $RestoreFallbackFolders).Count -eq 0 -and
              (Split-E2PropertyList $RestoreAdditionalProjectFallbackFolders).Count -eq 0
            $effectiveSetValid = @($EffectiveSources).Count -eq $(if ($libraryPacksDeclared) { 2 } else { 1 }) -and
              $invalidSources.Count -eq 0 -and
              $httpsSources.Count -eq 1 -and
              [string]::Equals($httpsSources[0], $expectedNuGetCanonical, [StringComparison]::OrdinalIgnoreCase) -and
              $localSources.Count -eq $(if ($libraryPacksDeclared) { 1 } else { 0 }) -and
              (-not $libraryPacksDeclared -or (Test-E2SamePath $localSources[0] $expectedLibraryPacksCanonical)) -and
              @($canonicalKeys | Sort-Object -Unique).Count -eq $canonicalKeys.Count

            if (-not $effectiveSetValid -or
                ($additionalSources.Count -ne 0 -and -not $libraryPacksDeclared) -or
                -not $restoreSourcesCoherent -or
                -not $fallbacksEmpty) {
              $safeSources = @($EffectiveSources | ForEach-Object { ConvertTo-SanitizedUri $_ })
              if ($safeSources.Count -eq 0) { $safeSources = @("<none>") }
              throw "Unexpected effective NuGet restore sources:`n- $($safeSources -join "`n- ")"
            }

            return $libraryPacksDeclared
          }

          function Assert-E2LibraryPacksLocation {
            param([string]$DotnetRoot, [string]$LibraryPacksPath)

            $canonicalRoot = Get-E2CanonicalNativePath $DotnetRoot
            $canonicalLibraryPacks = Get-E2CanonicalNativePath $LibraryPacksPath
            $expectedLibraryPacks = Get-E2CanonicalNativePath (Join-Path $canonicalRoot "library-packs")
            if (-not (Test-E2SamePath $canonicalLibraryPacks $expectedLibraryPacks) -or
                -not (Test-E2SamePath (Split-Path -Parent $canonicalLibraryPacks) $canonicalRoot) -or
                -not (Test-Path -LiteralPath $canonicalLibraryPacks -PathType Container)) {
              throw "The SDK library-packs source is not the expected directory."
            }

            $item = Get-Item -LiteralPath $canonicalLibraryPacks -Force
            if (($item.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0 -or
                -not [string]::IsNullOrWhiteSpace([string]$item.LinkType) -or
                $null -ne $item.Target) {
              throw "The SDK library-packs source must not be a link or reparse point."
            }
          }

          function Assert-E2LibraryPacksInventory {
            param([string]$LibraryPacksPath)

            $items = @(Get-ChildItem -LiteralPath $LibraryPacksPath -Force)
            if ($items.Count -eq 0 -or
                @($items | Where-Object { $_ -isnot [IO.FileInfo] -or $_.Extension -ne ".nupkg" }).Count -ne 0) {
              throw "The SDK library-packs inventory must contain only first-level nupkg files."
            }

            foreach ($packageFile in $items) {
              if ($packageFile.BaseName -match "(?i)^(AutoCAD\.NET(?:\.Core|\.Model)?|Autodesk)(?:[._-]|$)") {
                throw "Autodesk package content is forbidden in the SDK library-packs source."
              }
              $archive = [IO.Compression.ZipFile]::OpenRead($packageFile.FullName)
              try {
                $forbiddenDlls = @(
                  $archive.Entries |
                    ForEach-Object { [IO.Path]::GetFileName($_.FullName) } |
                    Where-Object { $_ -match "(?i)^(Ac|Ad|Autodesk).*\.dll$" }
                )
                if ($forbiddenDlls.Count -ne 0) {
                  throw "Autodesk DLL content is forbidden in the SDK library-packs source."
                }
              } finally {
                $archive.Dispose()
              }
            }
          }

          function Assert-E2AutodeskPackageProvenance {
            param(
              [string]$PackageId,
              [string]$Version,
              [string]$ExpectedContentHash,
              [string]$NuGetPackagesRoot,
              [AllowEmptyString()][string]$LibraryPacksPath
            )

            $packageDirectory = Join-Path $NuGetPackagesRoot "$($PackageId.ToLowerInvariant())\$Version"
            if (-not (Test-E2PathWithin $packageDirectory $NuGetPackagesRoot) -or
                (-not [string]::IsNullOrWhiteSpace($LibraryPacksPath) -and
                 (Test-E2PathWithin $packageDirectory $LibraryPacksPath))) {
              throw "Autodesk package is outside the isolated NuGet package cache."
            }

            $metadataPath = Join-Path $packageDirectory ".nupkg.metadata"
            if (-not (Test-Path -LiteralPath $metadataPath -PathType Leaf)) {
              throw "Autodesk package provenance metadata is missing for $PackageId."
            }
            $metadata = Get-Content -LiteralPath $metadataPath -Raw | ConvertFrom-Json
            $source = Get-E2CanonicalHttpsSource ([string]$metadata.source)
            $expectedSource = ([Uri]"https://api.nuget.org/v3/index.json").AbsoluteUri.TrimEnd('/')
            if ([string]::IsNullOrWhiteSpace([string]$metadata.source) -or
                $null -eq $source -or
                -not [string]::Equals($source, $expectedSource, [StringComparison]::OrdinalIgnoreCase) -or
                [string]$metadata.contentHash -ne $ExpectedContentHash) {
              throw "Unexpected Autodesk package provenance for $PackageId."
            }

            if (-not [string]::IsNullOrWhiteSpace($LibraryPacksPath) -and
                (Test-Path -LiteralPath $LibraryPacksPath -PathType Container) -and
                @(Get-ChildItem -LiteralPath $LibraryPacksPath -File -Filter "$PackageId.$Version.nupkg").Count -ne 0) {
              throw "Autodesk package is duplicated in the SDK library-packs source."
            }
          }
          # E2 source policy helpers: end

          $msbuildPropertyOutput = @(
            & dotnet msbuild $project `
              @positiveProperties `
              -p:Configuration=Release `
              "-p:RestoreConfigFile=$env:E2_NUGET_CONFIG" `
              "-getProperty:RestoreSources,RestoreAdditionalProjectSources,RestoreFallbackFolders,RestoreAdditionalProjectFallbackFolders,MSBuildSDKsPath" 2>&1
          )
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to query effective MSBuild restore properties."
          }
          try {
            $msbuildPropertyResult = $msbuildPropertyOutput -join [Environment]::NewLine | ConvertFrom-Json
          } catch {
            throw "Unable to parse effective MSBuild restore properties."
          }
          $msbuildRestoreProperties = $msbuildPropertyResult.Properties
          $sdkPath = [string]$msbuildRestoreProperties.MSBuildSDKsPath
          if (-not [string]::IsNullOrWhiteSpace($env:DOTNET_ROOT)) {
            $script:E2EffectiveDotnetRoot = $env:DOTNET_ROOT
          } elseif (-not [string]::IsNullOrWhiteSpace($sdkPath)) {
            $script:E2EffectiveDotnetRoot = Split-Path -Parent (Split-Path -Parent (Split-Path -Parent $sdkPath))
          }

          $sdkVersionOutput = @(& dotnet --version 2>&1)
          if ($LASTEXITCODE -ne 0 -or $sdkVersionOutput.Count -eq 0) {
            throw "Unable to identify the effective .NET SDK version."
          }
          $sdkVersion = [string]$sdkVersionOutput[-1]
          $libraryPacksPath = if ([string]::IsNullOrWhiteSpace($script:E2EffectiveDotnetRoot)) {
            $null
          } else {
            Join-Path $script:E2EffectiveDotnetRoot "library-packs"
          }
          $libraryPacksExists = -not [string]::IsNullOrWhiteSpace($libraryPacksPath) -and
            (Test-Path -LiteralPath $libraryPacksPath -PathType Container)
          $libraryPackEntries = if ($libraryPacksExists) {
            @(Get-ChildItem -LiteralPath $libraryPacksPath -Force | Select-Object -ExpandProperty Name | Sort-Object)
          } else {
            @()
          }

          [xml]$experimentalNuGetConfig = Get-Content -LiteralPath $env:E2_NUGET_CONFIG -Raw
          $configuredSources = @(
            $experimentalNuGetConfig.configuration.packageSources.add |
              ForEach-Object { [string]$_.value }
          )
          $nugetListSourceOutput = @(
            & dotnet nuget list source --configfile $env:E2_NUGET_CONFIG 2>&1
          )
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to list sources from the experimental NuGet.Config."
          }

          $packageFolderDiagnostics = @($assets.packageFolders.PSObject.Properties.Name)
          $fallbackFolderDiagnostics = if ($null -eq $assets.project.restore.fallbackFolders) {
            @()
          } else {
            @($assets.project.restore.fallbackFolders.PSObject.Properties.Name)
          }
          $configFileDiagnostics = @($assets.project.restore.configFilePaths)
          $assetFrameworkDiagnostics = @($assets.project.restore.frameworks.PSObject.Properties.Name)

          Write-Host "--- E2 NuGet source diagnostics: begin ---"
          Write-SanitizedList "project.restore.sources" $sources "Source"
          Write-Host ""
          Write-SanitizedList "packageFolders" $packageFolderDiagnostics "Path"
          Write-Host ""
          Write-SanitizedList "fallbackFolders" $fallbackFolderDiagnostics "Path"
          Write-Host ""
          Write-SanitizedList "configFilePaths" $configFileDiagnostics "Path"
          Write-Host ""
          Write-SanitizedList "assets frameworks" $assetFrameworkDiagnostics "Text"
          Write-Host ""
          Write-Host "MSBuild restore properties:"
          Write-Host "- RestoreSources: $((ConvertTo-SanitizedSourceList ([string]$msbuildRestoreProperties.RestoreSources)) -join '; ')"
          Write-Host "- RestoreAdditionalProjectSources: $((ConvertTo-SanitizedSourceList ([string]$msbuildRestoreProperties.RestoreAdditionalProjectSources)) -join '; ')"
          Write-Host "- RestoreFallbackFolders: $((ConvertTo-SanitizedPathList ([string]$msbuildRestoreProperties.RestoreFallbackFolders)) -join '; ')"
          Write-Host "- RestoreAdditionalProjectFallbackFolders: $((ConvertTo-SanitizedPathList ([string]$msbuildRestoreProperties.RestoreAdditionalProjectFallbackFolders)) -join '; ')"
          Write-Host ""
          Write-Host ".NET:"
          Write-Host "- DOTNET_ROOT: $(ConvertTo-SanitizedPath ([string]$env:DOTNET_ROOT))"
          Write-Host "- SDK: $(ConvertTo-SanitizedText $sdkVersion)"
          Write-Host "- SDK path: $(ConvertTo-SanitizedPath $sdkPath)"
          Write-Host "- library-packs exists: $($libraryPacksExists.ToString().ToLowerInvariant())"
          Write-SanitizedList "library-packs entries" $libraryPackEntries "Text"
          Write-Host ""
          Write-SanitizedList "NuGet.Config sources" $configuredSources "Source"
          Write-Host ""
          Write-SanitizedList "dotnet nuget list source" $nugetListSourceOutput "Text"
          Write-Host "--- E2 NuGet source diagnostics: end ---"

          if ([string]::IsNullOrWhiteSpace($env:DOTNET_ROOT) -or
              -not [IO.Path]::IsPathRooted($env:DOTNET_ROOT)) {
            throw "DOTNET_ROOT must be an absolute path for E2."
          }
          $canonicalDotnetRoot = Get-E2CanonicalNativePath $env:DOTNET_ROOT
          $expectedLibraryPacks = Get-E2CanonicalNativePath (Join-Path $canonicalDotnetRoot "library-packs")
          $libraryPacksDeclared = Assert-E2SourcePolicy `
            $sources `
            ([string]$msbuildRestoreProperties.RestoreSources) `
            ([string]$msbuildRestoreProperties.RestoreAdditionalProjectSources) `
            $fallbackFolderDiagnostics `
            ([string]$msbuildRestoreProperties.RestoreFallbackFolders) `
            ([string]$msbuildRestoreProperties.RestoreAdditionalProjectFallbackFolders) `
            $expectedLibraryPacks
          if ($libraryPacksDeclared) {
            Assert-E2LibraryPacksLocation $canonicalDotnetRoot $expectedLibraryPacks
            Assert-E2LibraryPacksInventory $expectedLibraryPacks
            Write-Host "SDK library-packs source validated without Autodesk content."
          }

          Write-Host "Autodesk package provenance:"
          foreach ($packageId in $expected.Keys) {
            $package = $expected[$packageId]
            Assert-E2AutodeskPackageProvenance `
              $packageId `
              $package.Version `
              ([string]$lockByName[$packageId].contentHash) `
              $env:NUGET_PACKAGES `
              $(if ($libraryPacksDeclared) { $expectedLibraryPacks } else { "" })
            Write-Host "- $packageId $($package.Version): nuget.org"
          }

          $packageFolders = @($assets.packageFolders.PSObject.Properties.Name)
          if ($packageFolders.Count -ne 1 -or
              -not (Test-E2SamePath $packageFolders[0] $env:NUGET_PACKAGES)) {
            throw "project.assets.json does not use only the isolated package folder."
          }

          $assetPackages = @($assets.libraries.PSObject.Properties | Where-Object { $_.Value.type -eq "package" })
          $assetPackageNames = @($assetPackages.Name | Sort-Object)
          $expectedAssetNames = @($expected.Keys | ForEach-Object { "$_/$($expected[$_].Version)" } | Sort-Object)
          if (@(Compare-Object $expectedAssetNames $assetPackageNames).Count -ne 0) {
            throw "project.assets.json contains a missing or unexpected package: $($assetPackageNames -join ', ')."
          }
          $targets = @($assets.targets.PSObject.Properties)
          if ($targets.Count -ne 1) {
            throw "Expected one target graph in project.assets.json."
          }
          foreach ($packageId in $expected.Keys) {
            $key = "$packageId/$($expected[$packageId].Version)"
            $targetPackage = $targets[0].Value.PSObject.Properties[$key].Value
            $compileAssets = @($targetPackage.compile.PSObject.Properties.Name)
            $runtimeAssets = @($targetPackage.runtime.PSObject.Properties.Name)
            if ($expected[$packageId].Compile -notin $compileAssets) {
              throw "Expected compile asset missing for $key."
            }
            if (@($runtimeAssets | Where-Object { $_ -match "(?i)\.dll$" }).Count -ne 0 -or
                @($runtimeAssets | Where-Object { $_ -notmatch "(?i)/_\._$" }).Count -ne 0) {
              throw "Unexpected runtime assets selected for $key."
            }
            Write-Host "$key compile assets: $($compileAssets -join ', ')"
            Write-Host "$key runtime assets: $($runtimeAssets -join ', ')"
          }
          Write-Host "Effective target: $($targets[0].Name)"
          Write-Host "Package folder: <RUNNER_TEMP>/rackcad-i13-e2/nuget-packages"
          Write-Host "Temporary lock reviewed; second restore completed in locked mode."

      - name: Resolve and audit Autodesk references
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $project = "src/RackCad.Plugin/RackCad.Plugin.csproj"
          $properties = @(
            "-p:Configuration=Release",
            "-p:UseAutoCADNuGetReferences=true",
            "-p:AutoCADInstallDir=$env:E2_EMPTY_AUTOCAD_DIR",
            "-p:RestorePackagesPath=$env:NUGET_PACKAGES"
          )
          $structuredOutput = @(& dotnet msbuild $project -t:ResolveReferences @properties -getProperty:TargetFramework,AutoCADInstallDir,UseAutoCADNuGetReferences -getItem:ReferencePath,ReferenceCopyLocalPaths 2>&1)
          if ($LASTEXITCODE -ne 0) {
            $structuredOutput | ForEach-Object { Write-Host $_ }
            throw "Structured ResolveReferences failed."
          }
          $structuredText = $structuredOutput -join [Environment]::NewLine
          $jsonStart = $structuredText.IndexOf('{')
          $jsonEnd = $structuredText.LastIndexOf('}')
          if ($jsonStart -lt 0 -or $jsonEnd -le $jsonStart) {
            throw "Structured ResolveReferences did not return JSON."
          }
          $resolved = $structuredText.Substring($jsonStart, $jsonEnd - $jsonStart + 1) | ConvertFrom-Json
          $referencePaths = @($resolved.Items.ReferencePath)
          $copyLocalPaths = @($resolved.Items.ReferenceCopyLocalPaths)

          function Metadata([object]$item, [string]$name) {
            $property = $item.PSObject.Properties[$name]
            if ($null -eq $property) { return "" }
            return [string]$property.Value
          }
          function ItemPath([object]$item) {
            $fullPath = Metadata $item "FullPath"
            if ($fullPath) { return $fullPath }
            return [string]$item.Identity
          }
          $autodeskAssemblyNames = @(Get-ChildItem -LiteralPath $env:NUGET_PACKAGES -Recurse -File -Filter "*.dll" |
            Select-Object -ExpandProperty Name -Unique)
          if ($autodeskAssemblyNames.Count -ne 13) {
            throw "Expected 13 Autodesk assemblies in the isolated packages, found $($autodeskAssemblyNames.Count)."
          }
          function IsAutodeskAssembly([string]$path) {
            $name = [IO.Path]::GetFileName($path)
            return $name -in $autodeskAssemblyNames -or $name -cmatch "^(Ac[A-Z]|Ad[A-Z]|Autodesk).+\.dll$"
          }

          $autodeskReferences = @($referencePaths | Where-Object {
            (Metadata $_ "NuGetPackageId") -like "AutoCAD.NET*" -or (IsAutodeskAssembly (ItemPath $_))
          })
          if ($autodeskReferences.Count -ne 13) {
            throw "Expected 13 Autodesk compile references, found $($autodeskReferences.Count)."
          }
          $cacheRoot = [IO.Path]::GetFullPath($env:NUGET_PACKAGES).TrimEnd('\') + '\'
          foreach ($reference in $autodeskReferences) {
            $path = [IO.Path]::GetFullPath((ItemPath $reference))
            if (-not $path.StartsWith($cacheRoot, [StringComparison]::OrdinalIgnoreCase)) {
              throw "Autodesk reference resolved outside the isolated cache: $path"
            }
            if ($path -match "(?i)C:\\Program Files\\Autodesk|AutoCAD 2025") {
              throw "Autodesk reference resolved from a local AutoCAD installation: $path"
            }
            if ((Metadata $reference "Private").ToLowerInvariant() -ne "false" -or
                (Metadata $reference "CopyLocal").ToLowerInvariant() -ne "false") {
              throw "Autodesk reference is not Private=false and CopyLocal=false: $path"
            }
          }

          $principal = [ordered]@{
            "AcCoreMgd.dll" = "AutoCAD.NET.Core"
            "AcDbMgd.dll" = "AutoCAD.NET.Model"
            "AcMgd.dll" = "AutoCAD.NET"
          }
          foreach ($assembly in $principal.Keys) {
            $matches = @($autodeskReferences | Where-Object { [IO.Path]::GetFileName((ItemPath $_)) -ceq $assembly })
            if ($matches.Count -ne 1) {
              throw "Expected exactly one resolved $assembly reference."
            }
            $reference = $matches[0]
            $path = ItemPath $reference
            if ((Metadata $reference "NuGetPackageId") -ne $principal[$assembly]) {
              throw "$assembly came from an unexpected package."
            }
            $assemblyVersion = [Reflection.AssemblyName]::GetAssemblyName($path).Version.ToString()
            if ($assemblyVersion -ne "25.0.0.0") {
              throw "$assembly has unexpected assembly version $assemblyVersion."
            }
            Write-Host "$assembly => <NUGET_PACKAGES>/$($principal[$assembly]); Version=$assemblyVersion; Private=false; CopyLocal=false; Runtime=false"
          }

          $autodeskCopyLocal = @($copyLocalPaths | Where-Object {
            (Metadata $_ "NuGetPackageId") -like "AutoCAD.NET*" -or (IsAutodeskAssembly (ItemPath $_))
          })
          if ($autodeskCopyLocal.Count -ne 0) {
            $autodeskCopyLocal | ForEach-Object { Write-Host "Unexpected ReferenceCopyLocalPaths: $(ItemPath $_)" }
            throw "ReferenceCopyLocalPaths contains Autodesk assemblies."
          }

          $diagnosticPath = Join-Path $env:E2_ROOT "resolve-references.diag.log"
          & dotnet msbuild $project -t:ResolveReferences @properties -v:diag *> $diagnosticPath
          if ($LASTEXITCODE -ne 0) {
            Get-Content -LiteralPath $diagnosticPath -Tail 100
            throw "Diagnostic ResolveReferences failed."
          }
          $localInstallMatches = @(Select-String -LiteralPath $diagnosticPath -Pattern "C:\Program Files\Autodesk", "AutoCAD 2025" -SimpleMatch)
          if ($localInstallMatches.Count -ne 0) {
            throw "ResolveReferences diagnostic log contains a local AutoCAD installation path."
          }
          Write-Host "ResolveReferences audit passed: 13 compile references in isolated cache; 0 Autodesk ReferenceCopyLocalPaths entries."

      - name: Build Plugin and solution in Release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $properties = @(
            "-p:UseAutoCADNuGetReferences=true",
            "-p:AutoCADInstallDir=$env:E2_EMPTY_AUTOCAD_DIR",
            "-p:RestorePackagesPath=$env:NUGET_PACKAGES"
          )

          $pluginTimer = [Diagnostics.Stopwatch]::StartNew()
          $pluginOutput = @(& dotnet build src/RackCad.Plugin/RackCad.Plugin.csproj -c Release --no-restore @properties -v:minimal 2>&1)
          $pluginExitCode = $LASTEXITCODE
          $pluginTimer.Stop()
          $pluginOutput | ForEach-Object { Write-Host $_ }
          $pluginWarnings = @($pluginOutput | Select-String -Pattern "\bwarning\s+(MSB|CS|NU|NETSDK)\d+\b")
          if ($pluginExitCode -ne 0 -or $pluginWarnings.Count -ne 0) {
            throw "Plugin Release build failed or introduced warnings (exit=$pluginExitCode, warnings=$($pluginWarnings.Count))."
          }
          Write-Host "Plugin Release: exit=0, warnings=0, elapsed=$($pluginTimer.Elapsed)."

          $restoreOutput = @(& dotnet restore RackCad.sln --configfile $env:E2_NUGET_CONFIG --no-cache --force @properties -p:Configuration=Release -v:minimal 2>&1)
          $restoreExitCode = $LASTEXITCODE
          $restoreOutput | ForEach-Object { Write-Host $_ }
          $restoreWarnings = @($restoreOutput | Select-String -Pattern "\bwarning\s+(MSB|CS|NU|NETSDK)\d+\b")
          if ($restoreExitCode -ne 0 -or $restoreWarnings.Count -ne 0) {
            throw "Solution restore failed or introduced warnings (exit=$restoreExitCode, warnings=$($restoreWarnings.Count))."
          }

          $solutionTimer = [Diagnostics.Stopwatch]::StartNew()
          $solutionOutput = @(& dotnet build RackCad.sln -c Release --no-restore @properties -v:minimal 2>&1)
          $solutionExitCode = $LASTEXITCODE
          $solutionTimer.Stop()
          $solutionOutput | ForEach-Object { Write-Host $_ }
          $solutionWarnings = @($solutionOutput | Select-String -Pattern "\bwarning\s+(MSB|CS|NU|NETSDK)\d+\b")
          if ($solutionExitCode -ne 0 -or $solutionWarnings.Count -ne 0) {
            throw "Solution Release build failed or introduced warnings (exit=$solutionExitCode, warnings=$($solutionWarnings.Count))."
          }
          Write-Host "Solution Release: exit=0, warnings=0, elapsed=$($solutionTimer.Elapsed)."

      - name: Run Windows tests and catalog guardian
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $testProject = "tests/RackCad.Tests/RackCad.Tests.csproj"

          & dotnet test $testProject -c Release --no-build --no-restore -v:minimal --logger "trx;LogFileName=e2-full.trx" --results-directory $env:E2_TEST_RESULTS
          if ($LASTEXITCODE -ne 0) {
            throw "Full Windows test suite failed."
          }
          [xml]$fullTrx = Get-Content -LiteralPath (Join-Path $env:E2_TEST_RESULTS "e2-full.trx") -Raw
          $fullCounters = $fullTrx.SelectSingleNode("//*[local-name()='Counters']")
          $fullTotal = [int]$fullCounters.total
          $fullPassed = [int]$fullCounters.passed
          $fullNotExecuted = [int]$fullCounters.notExecuted
          if ($fullTotal -lt 636 -or $fullPassed -ne $fullTotal -or $fullNotExecuted -ne 0 -or
              [int]$fullCounters.failed -ne 0 -or [int]$fullCounters.error -ne 0 -or
              [int]$fullCounters.timeout -ne 0 -or [int]$fullCounters.aborted -ne 0) {
            throw "Windows suite did not meet the baseline: total=$fullTotal passed=$fullPassed notExecuted=$fullNotExecuted."
          }

          $guardian = "FullyQualifiedName=RackCad.Tests.CatalogCanonicalIdsTests.ShippedCatalogs_MatchCanonicalTestExpectations"
          & dotnet test $testProject -c Release --no-build --no-restore -v:minimal --filter $guardian --logger "trx;LogFileName=e2-guardian.trx" --results-directory $env:E2_TEST_RESULTS
          if ($LASTEXITCODE -ne 0) {
            throw "Canonical catalog guardian failed."
          }
          [xml]$guardianTrx = Get-Content -LiteralPath (Join-Path $env:E2_TEST_RESULTS "e2-guardian.trx") -Raw
          $guardianCounters = $guardianTrx.SelectSingleNode("//*[local-name()='Counters']")
          if ([int]$guardianCounters.total -ne 1 -or [int]$guardianCounters.passed -ne 1 -or [int]$guardianCounters.notExecuted -ne 0) {
            throw "Canonical catalog guardian did not produce the expected 1/1 result."
          }
          Write-Host "Windows tests: $fullPassed/$fullTotal passed; 0 failed; 0 not executed. Guardian: 1/1."

      - name: Guard outputs and bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $expectedAutodeskPackages = [ordered]@{
            "AutoCAD.NET" = @{ Folder = "autocad.net"; Version = "25.0.1" }
            "AutoCAD.NET.Core" = @{ Folder = "autocad.net.core"; Version = "25.0.0" }
            "AutoCAD.NET.Model" = @{ Folder = "autocad.net.model"; Version = "25.0.0" }
          }
          $lock = Get-Content -LiteralPath $env:E2_LOCK_FILE -Raw | ConvertFrom-Json
          $frameworks = @($lock.dependencies.PSObject.Properties)
          if ($frameworks.Count -ne 1) {
            throw "Expected one locked target framework while guarding outputs."
          }
          $lockedGraph = $frameworks[0].Value
          $autodeskPackageRoots = @()
          foreach ($packageId in $expectedAutodeskPackages.Keys) {
            $package = $expectedAutodeskPackages[$packageId]
            $packageBase = Join-Path $env:NUGET_PACKAGES $package.Folder
            if (-not (Test-Path -LiteralPath $packageBase -PathType Container)) {
              throw "Expected Autodesk package directory is missing: $packageBase"
            }
            $versionDirectories = @(Get-ChildItem -LiteralPath $packageBase -Directory)
            if ($versionDirectories.Count -ne 1 -or $versionDirectories[0].Name -ne $package.Version) {
              throw "Unexpected installed versions for ${packageId}: $($versionDirectories.Name -join ', ')."
            }
            $packageRoot = Join-Path $packageBase $package.Version
            $lockEntry = $lockedGraph.PSObject.Properties[$packageId]
            if ($null -eq $lockEntry -or [string]$lockEntry.Value.resolved -ne $package.Version) {
              throw "Output guard package path does not match the lock for $packageId."
            }
            $metadataPath = Join-Path $packageRoot ".nupkg.metadata"
            if (-not (Test-Path -LiteralPath $metadataPath -PathType Leaf)) {
              throw "Expected package metadata is missing for $packageId."
            }
            $metadata = Get-Content -LiteralPath $metadataPath -Raw | ConvertFrom-Json
            if ([string]$metadata.contentHash -ne [string]$lockEntry.Value.contentHash -or
                [string]$metadata.source -ne "https://api.nuget.org/v3/index.json") {
              throw "Output guard package metadata does not match the validated lock/source for $packageId."
            }
            $autodeskPackageRoots += $packageRoot
          }

          $autodeskAssemblyNames = @($autodeskPackageRoots | ForEach-Object {
            Get-ChildItem -LiteralPath $_ -Recurse -File -Filter "*.dll" |
              Select-Object -ExpandProperty Name
          } | Sort-Object -Unique)
          if ($autodeskAssemblyNames.Count -eq 0) {
            throw "The Autodesk assembly inventory is empty."
          }
          foreach ($requiredAssembly in "AcCoreMgd.dll", "AcDbMgd.dll", "AcMgd.dll") {
            if ($requiredAssembly -notin $autodeskAssemblyNames) {
              throw "Required Autodesk assembly is missing from the package inventory: $requiredAssembly"
            }
          }
          $foreignAssemblyNames = @($autodeskAssemblyNames | Where-Object {
            $_ -ieq "testhost.dll" -or $_ -ieq "Newtonsoft.Json.dll" -or
              $_ -ilike "xunit*.dll" -or $_ -ilike "Microsoft.TestPlatform*.dll"
          })
          if ($foreignAssemblyNames.Count -ne 0) {
            throw "Non-Autodesk package assemblies contaminated the Autodesk inventory: $($foreignAssemblyNames -join ', ')."
          }
          $autodeskAssemblyNameSet = [Collections.Generic.HashSet[string]]::new([StringComparer]::OrdinalIgnoreCase)
          foreach ($assemblyName in $autodeskAssemblyNames) {
            [void]$autodeskAssemblyNameSet.Add($assemblyName)
          }
          Write-Host "Autodesk package inventory: $($autodeskAssemblyNames.Count) DLLs from three exact package roots."
          function IsAutodeskAssembly([IO.FileInfo]$file) {
            return $autodeskAssemblyNameSet.Contains($file.Name) -or $file.Name -cmatch "^(Ac[A-Z]|Ad[A-Z]|Autodesk).+\.dll$"
          }

          $roots = @("src", "tests", "deploy")
          $outputDlls = @($roots | ForEach-Object {
            Get-ChildItem -LiteralPath $_ -Recurse -File | Where-Object { $_.Extension -ieq ".dll" }
          })
          $forbiddenDlls = @($outputDlls | Where-Object { IsAutodeskAssembly $_ })
          if ($forbiddenDlls.Count -ne 0) {
            $forbiddenDlls | ForEach-Object { Write-Host "Forbidden Autodesk output: $($_.FullName)" }
            throw "Autodesk DLLs were copied outside the isolated NuGet cache."
          }

          $repositoryPackages = @(Get-ChildItem -LiteralPath $env:GITHUB_WORKSPACE -Recurse -File | Where-Object {
            $_.Name -like "*.nupkg" -or $_.Name -eq "packages.lock.json"
          })
          if ($repositoryPackages.Count -ne 0) {
            $repositoryPackages | ForEach-Object { Write-Host "Unexpected repository package/lock: $($_.FullName)" }
            throw "A package or temporary lock escaped into the checkout."
          }

          $bundles = @(Get-ChildItem -LiteralPath "src" -Recurse -Directory -Filter "RackCad.bundle" | Where-Object {
            $_.FullName -match "[\\/]bin[\\/]"
          })
          if ($bundles.Count -ne 1) {
            throw "Expected exactly one generated RackCad.bundle, found $($bundles.Count)."
          }
          $bundle = $bundles[0]
          $bundleDlls = @(Get-ChildItem -LiteralPath (Join-Path $bundle.FullName "Contents") -Recurse -File -Filter "*.dll")
          $bundleDlls | Sort-Object Name | ForEach-Object {
            Write-Host "Bundle DLL: $($_.Name) ($($_.Length) bytes)"
          }
          $expectedBundleDlls = @("RackCad.Application.dll", "RackCad.Domain.dll", "RackCad.Plugin.dll", "RackCad.UI.dll") | Sort-Object
          $actualBundleDlls = @($bundleDlls.Name | Sort-Object)
          if (@(Compare-Object $expectedBundleDlls $actualBundleDlls).Count -ne 0) {
            throw "The generated bundle DLL inventory changed: $($actualBundleDlls -join ', ')."
          }
          if (-not (Test-Path -LiteralPath (Join-Path $bundle.FullName "PackageContents.xml")) -or
              -not (Test-Path -LiteralPath (Join-Path $bundle.FullName "Contents\catalogs"))) {
            throw "The generated bundle is missing its manifest or catalogs."
          }

          $generatedArchives = @(Get-ChildItem -LiteralPath $env:GITHUB_WORKSPACE -Recurse -File -Filter "*.zip")
          if ($generatedArchives.Count -ne 0) {
            $generatedArchives | ForEach-Object { Write-Host "Unexpected ZIP: $($_.FullName)" }
            throw "E2 generated an unexpected ZIP/deliverable."
          }
          Write-Host "Output guard passed: 0 Autodesk DLLs outside cache; bundle contains only four RackCad DLLs; no package, lock, or ZIP escaped."
